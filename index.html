<script>
  // Theme bootstrap: prefer saved choice, else system, else dark.
  // Runs before CSS to prevent a light flash.
  (function () {
    const KEY = 'juxtaphi-theme';
    const stored = (() => {
      try {
        return localStorage.getItem(KEY);
      } catch {
        return null;
      }
    })();
    const isValid = stored === 'dark' || stored === 'light' || stored === 'system';
    const hasSystem = typeof window !== 'undefined'
      && typeof window.matchMedia === 'function'
      && (window.matchMedia('(prefers-color-scheme: dark)').matches
        || window.matchMedia('(prefers-color-scheme: light)').matches);
    const theme = isValid ? stored : (hasSystem ? 'system' : 'dark');
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<style>

    --james-rule:  oklch(0.25 0.07 55);
    --stoic:       oklch(0.60 0.12 240);

    --overlap:     oklch(0.38 0.06 150);
    --overlap-bg:  oklch(0.96 0.015 150);
    --toggle-bg:   oklch(0.90 0.008 70);

    --stoic:       oklch(0.60 0.12 240);

    --stoic-rule:  oklch(0.23 0.06 240);
    --overlap:     oklch(0.60 0.09 155);

    [data-theme="system"] {

      --bg:          oklch(0.11 0.012 55);

      --ink:         oklch(0.93 0.008 72);
      --ink-mid:     oklch(0.60 0.008 68);
      --ink-light:   oklch(0.38 0.008 65);
      --rule:        oklch(0.21 0.010 55);
      --james:       oklch(0.68 0.14 55);
      --james-bg:    oklch(0.17 0.04 55);
      --james-rule:  oklch(0.25 0.07 55);
      --stoic:       oklch(0.60 0.12 240);

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-size: var(--body-font-size, 15px);
    line-height: var(--body-line-height, 1.6);
    -webkit-font-smoothing: antialiased;
    transition: background 0.25s ease, color 0.25s ease;
  }

  /* ── WORDMARK ── */
  .site-header {
    padding: 20px 40px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .wordmark {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(0.9rem, 1.6vw, 1.15rem);
    font-weight: 300;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    line-height: 1;
    color: var(--ink-mid);
    display: flex;
    align-items: center;
    gap: 0.15em;
  }
  .wordmark .phi {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: clamp(2.8rem, 5.5vw, 4.4rem);
    letter-spacing: -0.02em;
    color: var(--james);
    line-height: 0.8;
  }
  .site-header-right {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 20px;
  }
  .site-header-meta {
    text-align: right;
    font-size: 7.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-light);
    font-weight: 400;
    line-height: 1.9;
  }

  /* ── TWEAKS TRIGGER ── */
  .tweaks-trigger {
    background: none;
    border: 1px solid var(--rule);
    border-radius: 4px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--ink-mid);
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    flex-shrink: 0;
  }
  .tweaks-trigger:hover {
    border-color: var(--ink-light);
    color: var(--ink);
    background: var(--bg-subtle);
  }

  /* ── INTRO ── */
  .intro {
    max-width: 480px;
    margin: 0 auto;
    padding: 48px 48px 40px;
    position: relative;
    text-wrap: balance;
  }
  .intro .tweaks-trigger {
    position: absolute;
    top: 20px;
    right: 0;
  }
  .intro-label {
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-light);
    font-weight: 500;
    margin-bottom: 20px;
  }
  .intro h2 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.5rem, 3vw, 2.1rem);
    line-height: 1.25;
    font-weight: 400;
    margin-bottom: 20px;
    color: var(--ink);
  }
  .intro p {
    font-size: 15px;
    color: var(--ink-mid);
    line-height: 1.75;
    font-weight: 300;
  }

  /* ── COMPARISON TABLE ── */
  .comparison-wrap {
    max-width: var(--content-width, 1240px);
    margin: 0 auto;
    padding: 0 32px 80px;
  }
  .phil-header {
    position: sticky;
    top: 0;
    z-index: 100;
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--bg);
    border-bottom: 1px solid var(--rule);
    transition: background 0.25s;
  }
  .phil-col-header {
    padding: 24px 40px 20px;
    border-top: 3px solid currentColor;
  }
  .phil-col-header.james { color: var(--james); border-right: 1px solid var(--rule); }
  .phil-col-header.stoic { color: var(--stoic); }
  .phil-col-name {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.3rem, 2.5vw, 1.9rem);
    font-weight: 400;
    line-height: 1;
    margin-bottom: 6px;
    color: var(--ink);
  }
  .phil-col-tag {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 500;
    opacity: 0.85;
  }
  .phil-col-dates {
    font-size: 12px;
    color: var(--ink-light);
    margin-top: 4px;
    font-weight: 300;
  }

  .category { border-bottom: 1px solid var(--rule); }
  .category-label-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 32px 40px 20px;
    border-bottom: 1px solid var(--rule);
  }
  .roman {
    font-family: 'DM Serif Display', serif;
    font-size: 13px;
    color: var(--ink-light);
    font-style: italic;
    min-width: 28px;
  }
  .category-name {
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--ink-mid);
  }
  .category-rule { flex: 1; height: 1px; background: var(--rule); }
  .category-cols { display: grid; grid-template-columns: 1fr 1fr; }
  .stance { padding: 32px 40px 36px; }
  .stance.james { border-right: 1px solid var(--rule); }
  .stance-claim {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.05rem, 1.8vw, 1.3rem);
    line-height: 1.35;
    font-weight: 400;
    margin-bottom: 16px;
    color: var(--ink);
  }
  .stance-body {
    font-size: 14px;
    color: var(--ink-mid);
    line-height: 1.75;
    font-weight: 300;
    margin-bottom: 24px;
  }
  .stance-body cite { font-style: italic; color: var(--ink); }
  .tags { display: flex; flex-direction: column; gap: 8px; }
  .tag {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 12.5px;
    line-height: 1.5;
  }
  .tag-label {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 2px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .tag.strength .tag-label {
    background: var(--james-bg);
    color: var(--james);
    border: 1px solid var(--james-rule);
  }
  .stance.stoic .tag.strength .tag-label {
    background: var(--stoic-bg);
    color: var(--stoic);
    border: 1px solid var(--stoic-rule);
  }
  .tag.weakness .tag-label {
    background: oklch(0.96 0.01 30);
    color: oklch(0.45 0.08 30);
    border: 1px solid oklch(0.88 0.03 30);
  }
  [data-theme="dark"] .tag.weakness .tag-label {
    background: oklch(0.18 0.03 25);
    color: oklch(0.72 0.13 25);
    border: 1px solid oklch(0.28 0.06 25);
  }
  @media (prefers-color-scheme: dark) {
    [data-theme="system"] .tag.weakness .tag-label {
      background: oklch(0.18 0.03 25);
      color: oklch(0.72 0.13 25);
      border: 1px solid oklch(0.28 0.06 25);
    }
  }
  .tag-text { color: var(--ink-mid); font-weight: 300; }

  /* ── QUIZ SECTION ── */
  .quiz-section {
    max-width: var(--content-width, 1240px);
    margin: 0 auto;
    padding: 0 32px 0;
  }
  .quiz-header {
    padding: 40px 40px 32px;
    border-top: 3px solid var(--james);
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: baseline;
    gap: 20px;
    flex-wrap: wrap;
  }
  .quiz-eyebrow {
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--james);
  }
  .quiz-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.4rem, 2.5vw, 2rem);
    font-weight: 400;
    color: var(--ink);
  }
  .quiz-subtitle {
    font-size: 13px;
    color: var(--ink-light);
    font-weight: 300;
    font-style: italic;
    margin-left: auto;
  }

  .quiz-body {
    padding: 40px 40px 48px;
    border-bottom: 1px solid var(--rule);
  }
  .quiz-intro {
    font-size: 14px;
    color: var(--ink-mid);
    font-weight: 300;
    margin-bottom: 36px;
    max-width: 560px;
    line-height: 1.7;
  }

  .quiz-questions { display: flex; flex-direction: column; gap: 0; }

  .quiz-q {
    padding: 28px 0;
    border-bottom: 1px solid var(--rule);
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 32px;
    align-items: start;
  }
  .quiz-q:last-of-type { border-bottom: none; }
  .quiz-q-label {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding-top: 2px;
  }
  .quiz-q-num {
    font-family: 'DM Serif Display', serif;
    font-size: 11px;
    font-style: italic;
    color: var(--ink-light);
  }
  .quiz-q-topic {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--ink-mid);
  }
  .quiz-q-scenario {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    color: var(--ink);
    line-height: 1.45;
    margin-bottom: 16px;
    font-weight: 400;
  }
  .quiz-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .quiz-option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
    padding: 12px 14px;
    border-radius: 3px;
    border: 1px solid var(--rule);
    transition: border-color 0.15s, background 0.15s;
  }
  .quiz-option:hover { border-color: var(--ink-light); background: var(--bg-subtle); }
  .quiz-option input[type="radio"] { display: none; }
  .quiz-option-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1.5px solid var(--ink-light);
    flex-shrink: 0;
    margin-top: 3px;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }
  .quiz-option-dot::after {
    content: '';
    position: absolute;
    inset: 2.5px;
    border-radius: 50%;
    background: transparent;
    transition: background 0.15s;
  }
  .quiz-option.selected-james { border-color: var(--james); background: var(--james-bg); }
  .quiz-option.selected-james .quiz-option-dot { border-color: var(--james); }
  .quiz-option.selected-james .quiz-option-dot::after { background: var(--james); }
  .quiz-option.selected-stoic { border-color: var(--stoic); background: var(--stoic-bg); }
  .quiz-option.selected-stoic .quiz-option-dot { border-color: var(--stoic); }
  .quiz-option.selected-stoic .quiz-option-dot::after { background: var(--stoic); }

  .quiz-option-text {
    font-size: 13.5px;
    color: var(--ink-mid);
    line-height: 1.55;
    font-weight: 300;
  }
  .quiz-option-badge {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    padding: 1px 6px;
    border-radius: 2px;
    margin-left: auto;
    flex-shrink: 0;
    align-self: flex-start;
    margin-top: 3px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .quiz-option.selected-james .quiz-option-badge,
  .quiz-option.selected-stoic .quiz-option-badge { opacity: 1; }
  .quiz-option.selected-james .quiz-option-badge { background: var(--james-bg); color: var(--james); border: 1px solid var(--james-rule); }
  .quiz-option.selected-stoic .quiz-option-badge { background: var(--stoic-bg); color: var(--stoic); border: 1px solid var(--stoic-rule); }

  .quiz-submit-row {
    margin-top: 36px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .quiz-submit {
    background: var(--ink);
    color: var(--bg);
    border: none;
    cursor: pointer;
    padding: 12px 28px;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    border-radius: 2px;
    transition: opacity 0.15s;
  }
  .quiz-submit:hover { opacity: 0.8; }
  .quiz-submit:disabled { opacity: 0.3; cursor: not-allowed; }
  .quiz-progress-text {
    font-size: 12px;
    color: var(--ink-light);
    font-weight: 300;
  }

  /* Quiz result */
  .quiz-result {
    display: none;
    margin-top: 36px;
    padding: 32px 36px;
    border-radius: 3px;
    border: 1px solid var(--rule);
    background: var(--bg-subtle);
    animation: fadeIn 0.4s ease;
  }
  .quiz-result.visible { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .quiz-result-eyebrow {
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--ink-light);
    margin-bottom: 12px;
  }
  .quiz-result-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 400;
    margin-bottom: 16px;
    line-height: 1.2;
  }
  .quiz-result-title.james { color: var(--james); }
  .quiz-result-title.stoic { color: var(--stoic); }
  .quiz-result-title.tied { color: var(--overlap); }
  .quiz-result-body {
    font-size: 14px;
    color: var(--ink-mid);
    line-height: 1.75;
    font-weight: 300;
    margin-bottom: 20px;
    max-width: 540px;
  }
  .quiz-score-bar {
    display: flex;
    height: 6px;
    border-radius: 3px;
    overflow: hidden;
    width: 100%;
    max-width: 400px;
    margin-bottom: 8px;
    background: var(--rule);
  }
  .quiz-score-james { background: var(--james); transition: width 0.6s cubic-bezier(0.25,1,0.5,1); }
  .quiz-score-stoic { background: var(--stoic); transition: width 0.6s cubic-bezier(0.25,1,0.5,1); }
  .quiz-score-labels {
    display: flex;
    justify-content: space-between;
    max-width: 400px;
    font-size: 11px;
    color: var(--ink-light);
    font-weight: 400;
    letter-spacing: 0.06em;
  }
  .quiz-retry {
    margin-top: 20px;
    background: none;
    border: 1px solid var(--rule);
    cursor: pointer;
    padding: 8px 18px;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    border-radius: 2px;
    color: var(--ink-mid);
    transition: border-color 0.15s, color 0.15s;
  }
  .quiz-retry:hover { border-color: var(--ink); color: var(--ink); }

  /* ── OVERLAP SECTION ── */
  .overlap-section {
    max-width: var(--content-width, 1240px);
    margin: 0 auto;
    padding: 0 32px 0;
  }
  .overlap-header {
    padding: 40px 40px 32px;
    border-top: 3px solid var(--overlap);
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: baseline;
    gap: 20px;
    flex-wrap: wrap;
  }
  .overlap-eyebrow {
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--overlap);
  }
  .overlap-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.4rem, 2.5vw, 2rem);
    font-weight: 400;
    color: var(--ink);
  }
  .overlap-subtitle {
    font-size: 13px;
    color: var(--ink-light);
    font-weight: 300;
    font-style: italic;
    margin-left: auto;
  }
  .overlap-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    border-bottom: 1px solid var(--rule);
  }
  .overlap-card {
    padding: 32px 40px 36px;
    border-right: 1px solid var(--rule);
  }
  .overlap-card:last-child { border-right: none; }
  .overlap-card-num {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 12px;
    color: var(--overlap);
    margin-bottom: 12px;
    display: block;
  }
  .overlap-card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    font-weight: 400;
    margin-bottom: 10px;
    color: var(--ink);
    line-height: 1.3;
  }
  .overlap-card-body {
    font-size: 13.5px;
    color: var(--ink-mid);
    line-height: 1.75;
    font-weight: 300;
  }

  /* ── FOOTER ── */
  footer {
    padding: 40px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--rule);
  }
  .footer-wordmark {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-mid);
    display: flex;
    align-items: baseline;
    gap: 0.15em;
  }
  .footer-wordmark .phi {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 1.8rem;
    letter-spacing: -0.02em;
    color: var(--james);
    line-height: 0.8;
  }
  .footer-note {
    font-size: 11px;
    color: var(--ink-light);
    letter-spacing: 0.06em;
    font-weight: 300;
  }

  .scroll-hint {
    text-align: center;
    padding: 12px 0 4px;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-light);
    font-weight: 500;
  }

  @media (max-width: 720px) {
    .site-header { flex-direction: column; align-items: flex-start; }
    .site-header-right { align-items: flex-start; }
    .phil-header { position: static; }
    .category-cols { grid-template-columns: 1fr; }
    .stance.james { border-right: none; border-bottom: 1px solid var(--rule); }
    .overlap-cards { grid-template-columns: 1fr; }
    .overlap-card { border-right: none; border-bottom: 1px solid var(--rule); }
    .intro, .comparison-wrap, .overlap-section, .quiz-section { padding-left: 20px; padding-right: 20px; }
    .site-header, footer { padding-left: 20px; padding-right: 20px; }
    .category-label-row, .stance, .overlap-card, .overlap-header, .phil-col-header,
    .quiz-header, .quiz-body { padding-left: 20px; padding-right: 20px; }
    .quiz-q { grid-template-columns: 1fr; gap: 12px; }
  }

  /* ── SOURCE REFS ── */
  .src-ref {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    font-size: 9px;
    font-style: normal;
    font-weight: 500;
    letter-spacing: 0;
    cursor: pointer;
    vertical-align: super;
    line-height: 1;
    background: var(--james-bg);
    color: var(--james);
    border: 1px solid var(--james-rule);
    transition: background 0.12s, color 0.12s;
    user-select: none;
    flex-shrink: 0;
    text-decoration: none;
    font-family: 'DM Sans', sans-serif;
    margin-left: 2px;
  }
  .src-ref:hover { background: var(--james); color: var(--bg); }
  .stance.stoic .src-ref {
    background: var(--stoic-bg);
    color: var(--stoic);
    border-color: var(--stoic-rule);
  }
  .stance.stoic .src-ref:hover { background: var(--stoic); color: var(--bg); }

  /* ── DESKTOP POPOVER ── */
  .src-popover {
    display: none;
    position: fixed;
    z-index: 500;
    width: 280px;
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 3px;
    padding: 16px 18px 18px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    pointer-events: auto;
  }
  .src-popover.visible { display: block; }
  .src-popover-title {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 0.95rem;
    color: var(--ink);
    line-height: 1.35;
    margin-bottom: 4px;
  }
  .src-popover-author {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--ink-light);
    margin-bottom: 10px;
  }
  .src-popover-year {
    font-size: 10px;
    color: var(--ink-light);
    font-weight: 300;
  }
  .src-popover-note {
    font-size: 12px;
    color: var(--ink-mid);
    line-height: 1.65;
    font-weight: 300;
    border-top: 1px solid var(--rule);
    padding-top: 10px;
    margin-top: 10px;
  }
  .src-popover-close {
    position: absolute;
    top: 10px;
    right: 10px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-light);
    font-size: 13px;
    line-height: 1;
    padding: 2px 4px;
  }
  .src-popover-close:hover { color: var(--ink); }

  /* ── MOBILE BOTTOM SHEET ── */
  .src-sheet-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 490;
    backdrop-filter: blur(2px);
  }
  .src-sheet-overlay.visible { display: block; }
  .src-sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg);
    border-top: 1px solid var(--rule);
    border-radius: 12px 12px 0 0;
    padding: 24px 24px 40px;
    z-index: 495;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 60vh;
    overflow-y: auto;
  }
  .src-sheet.visible { transform: translateY(0); }
  .src-sheet-handle {
    width: 36px;
    height: 4px;
    border-radius: 2px;
    background: var(--rule);
    margin: 0 auto 20px;
  }
  .src-sheet-title {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 1.15rem;
    color: var(--ink);
    line-height: 1.35;
    margin-bottom: 4px;
  }
  .src-sheet-author {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--ink-light);
    margin-bottom: 8px;
  }
  .src-sheet-year {
    font-size: 11px;
    color: var(--ink-light);
    font-weight: 300;
    margin-bottom: 14px;
  }
  .src-sheet-note {
    font-size: 14px;
    color: var(--ink-mid);
    line-height: 1.7;
    font-weight: 300;
    border-top: 1px solid var(--rule);
    padding-top: 14px;
  }

  @media (max-width: 720px) {
    .src-popover { display: none !important; }
  }

</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="wordmark"><span>juxta</span><span class="phi">Φ</span></div>
  <div class="site-header-right">
    <div class="site-header-meta" id="issue-header-meta"></div>
  </div>
</header>

<!-- INTRO -->
<section class="intro">
  <button class="tweaks-trigger" id="tweaks-open-btn" aria-label="Open reading settings" onclick="openTweaks()">
    <svg width="16" height="16" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="2" y1="4" x2="16" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="6" cy="4" r="2" fill="var(--bg)" stroke="currentColor" stroke-width="1.5"/>
      <line x1="2" y1="9" x2="16" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="12" cy="9" r="2" fill="var(--bg)" stroke="currentColor" stroke-width="1.5"/>
      <line x1="2" y1="14" x2="16" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="7" cy="14" r="2" fill="var(--bg)" stroke="currentColor" stroke-width="1.5"/>
    </svg>
  </button>
  <p class="intro-label" id="issue-intro-label"></p>
  <h2 id="issue-intro-headline"></h2>
  <p id="issue-intro-body"></p>
</section>

<div class="scroll-hint" id="issue-scroll-hint"></div>

<!-- COMPARISON -->
<div class="comparison-wrap">

  <div class="phil-header" id="issue-phil-header"></div>
  <div id="issue-comparison-categories"></div>
</div>

<!-- QUIZ SECTION -->
<div class="quiz-section">
  <div class="quiz-header">
    <span class="quiz-eyebrow" id="issue-quiz-eyebrow"></span>
    <span class="quiz-title" id="issue-quiz-title"></span>
    <span class="quiz-subtitle" id="issue-quiz-subtitle"></span>
  </div>
  <div class="quiz-body">
    <p class="quiz-intro" id="issue-quiz-intro"></p>

    <div class="quiz-questions" id="issue-quiz-questions"></div><!-- end quiz-questions -->

    <div class="quiz-submit-row">
      <button class="quiz-submit" id="quiz-submit-btn" disabled onclick="submitQuiz()">See your result</button>
      <span class="quiz-progress-text" id="quiz-progress">0 of 7 answered</span>
    </div>

    <div class="quiz-result" id="quiz-result">
      <div class="quiz-result-eyebrow">Your result</div>
      <div class="quiz-result-title" id="result-title"></div>
      <div class="quiz-score-bar">
        <div class="quiz-score-james" id="score-bar-james"></div>
        <div class="quiz-score-stoic" id="score-bar-stoic"></div>
      </div>
      <div class="quiz-score-labels">
        <span id="score-label-james">William James</span>
        <span id="score-label-stoic">Stoicism</span>
      </div>
      <div class="quiz-result-body" id="result-body" style="margin-top:20px;"></div>
      <button class="quiz-retry" id="quiz-retry-btn" onclick="resetQuiz()">Retake quiz</button>
    </div>

  </div><!-- end quiz-body -->
</div>

<!-- OVERLAP SECTION -->
<div class="overlap-section">
  <div class="overlap-header">
    <span class="overlap-eyebrow" id="issue-synth-eyebrow"></span>
    <span class="overlap-title" id="issue-synth-title"></span>
    <span class="overlap-subtitle" id="issue-synth-subtitle"></span>
  </div>
  <div class="overlap-cards" id="issue-synth-cards"></div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-wordmark"><span>juxta</span><span class="phi">Φ</span></div>
  <div class="footer-note" id="issue-footer-note"></div>
</footer>

<script>
  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('juxtaphi-theme', theme);
  }
</script>


<!-- SOURCE POPOVER (desktop) -->
<div class="src-popover" id="src-popover" role="tooltip">
  <button class="src-popover-close" onclick="closeSource()" aria-label="Close">✕</button>
  <div class="src-popover-author" id="sp-author"></div>
  <div class="src-popover-title" id="sp-title"></div>
  <div class="src-popover-year" id="sp-year"></div>
  <div class="src-popover-note" id="sp-note"></div>
</div>

<!-- SOURCE SHEET (mobile) -->
<div class="src-sheet-overlay" id="src-overlay" onclick="closeSource()"></div>
<div class="src-sheet" id="src-sheet">
  <div class="src-sheet-handle"></div>
  <div class="src-sheet-author" id="ss-author"></div>
  <div class="src-sheet-title" id="ss-title"></div>
  <div class="src-sheet-year" id="ss-year"></div>
  <div class="src-sheet-note" id="ss-note"></div>
</div>

<div id="tweaks-root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="content/issue-001.js"></script>
<script src="framework/issue-runtime.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "system",
  "fontSize": 17,
  "lineHeight": 1.6,
  "showCitations": true,
  "showWeaknesses": true
}/*EDITMODE-END*/;

function JuxtaphiTweaks() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Expose open fn for the header button — sends the protocol message TweaksPanel listens for
  React.useEffect(() => {
    window.__tweaksOpen = () => {
      window.dispatchEvent(new MessageEvent('message', {
        data: { type: '__activate_edit_mode' }
      }));
    };
  }, []);

  // Apply tweaks to the document
  React.useEffect(() => {
    const root = document.documentElement;
    root.setAttribute('data-theme', tweaks.theme);
    localStorage.setItem('juxtaphi-theme', tweaks.theme);
    let styleEl = document.getElementById('__juxtaphi-dynamic');
    if (!styleEl) { styleEl = document.createElement('style'); styleEl.id = '__juxtaphi-dynamic'; document.head.appendChild(styleEl); }
    let rules = `
      .stance-body, .intro p, .quiz-option-text, .overlap-card-body,
      .quiz-q-scenario, .quiz-result-body, .tag-text, .quiz-intro,
      .overlap-card-body, .site-header-meta, .quiz-progress-text {
        font-size: ${tweaks.fontSize}px !important;
        line-height: ${tweaks.lineHeight} !important;
      }
    `;
    if (!tweaks.showCitations) rules += 'cite { display: none !important; } ';
    if (!tweaks.showWeaknesses) rules += '.tag.weakness { display: none !important; } ';
    styleEl.textContent = rules;
  }, [tweaks]);

  return (
    <TweaksPanel title="Reading Settings">
      <TweakSection label="Appearance">
        <TweakSelect
          label="Color scheme"
          value={tweaks.theme}
          options={[{value:'dark',label:'Dark'},{value:'light',label:'Light'},{value:'system',label:'System'}]}
          onChange={v => setTweak('theme', v)}
        />
      </TweakSection>

      <TweakSection label="Typography">
        <TweakSlider
          label="Font size"
          value={tweaks.fontSize}
          min={12} max={20} step={1}
          unit="px"
          onChange={v => setTweak('fontSize', v)}
        />
        <TweakSlider
          label="Line height"
          value={tweaks.lineHeight}
          min={1.3} max={2.2} step={0.05}
          onChange={v => setTweak('lineHeight', Math.round(v * 100) / 100)}
        />
      </TweakSection>

      <TweakSection label="Content">
        <TweakToggle
          label="Show citations"
          value={tweaks.showCitations}
          onChange={v => setTweak('showCitations', v)}
        />
        <TweakToggle
          label="Show weaknesses"
          value={tweaks.showWeaknesses}
          onChange={v => setTweak('showWeaknesses', v)}
        />
      </TweakSection>
    </TweaksPanel>
  );
}

ReactDOM.createRoot(document.getElementById('tweaks-root')).render(<JuxtaphiTweaks />);
</script>

</body>
</html>
